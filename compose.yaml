services:
  postgres-dev:
    image: postgres:18
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=dev@@lofombo102030OK
      - POSTGRES_DB=lofombo 
    ports:
      - "6543:5432"
    volumes:
      - ../postgres/postgres_data:/var/lib/postgresql
      - ../postgres/postgres_logs:/var/log/postgresql
    container_name: postgres-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lofombo -h localhost -p 6543"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
  lofombo-dev-app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/lofombo
    depends_on:
      - postgres-dev
    container_name: lofombo-dev-app
    command: php artisan serve --host=0.0.0.0 --port=8000

  laravel-queue:
    build: .
    volumes:
      - .:/var/www/lofombo
    command: php artisan queue:work --tries=3 --timeout=300 --verbose 
    depends_on:
      - postgres-dev
    container_name: laravel-queue




